name: Deploy PR Preview

on:
  pull_request:
    branches: [main]

  workflow_dispatch: # This enables the "Run workflow" button

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci

      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/${{ github.event.pull_request.number }}/

      - name: Deploy preview
        run: |
          PR=${{ github.event.pull_request.number }}

          # Save build output before switching branches
          cp -r dist /tmp/pr-dist

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin gh-pages || true
          if git checkout gh-pages; then
            git reset --hard origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          mkdir -p pr-preview/$PR
          rm -rf pr-preview/$PR/*
          cp -r /tmp/pr-dist/* pr-preview/$PR/

          git add pr-preview/$PR
          git commit -m "Deploy preview for PR $PR" || true
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages
