name: Deploy PR Preview

on:
  pull_request:
    branches: [main]

  workflow_dispatch: # This enables the "Run workflow" button

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci

      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/${{ github.event.pull_request.number }}/

      - name: Deploy preview
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}

          cd /tmp
          git clone --branch gh-pages --single-branch https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages-repo || {
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages-repo
            cd gh-pages-repo
            git checkout --orphan gh-pages
            git rm -rf .
          }
          cd /tmp/gh-pages-repo

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p pr-preview/$PR
          rm -rf pr-preview/$PR/*
          cp -r $GITHUB_WORKSPACE/dist/* pr-preview/$PR/

          git add -A
          git commit -m "Deploy preview for PR $PR" || true
          git push origin gh-pages
