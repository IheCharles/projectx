name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci

      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/${{ github.event.pull_request.number }}/

      - name: Deploy preview
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git clone --branch gh-pages --single-branch "$REPO_URL" /tmp/gh-pages || {
            git init /tmp/gh-pages
            git -C /tmp/gh-pages checkout --orphan gh-pages
          }

          cd /tmp/gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p pr-preview/$PR
          rm -rf pr-preview/$PR/*
          cp -r $GITHUB_WORKSPACE/dist/* pr-preview/$PR/

          git add -A
          git commit -m "Deploy preview for PR $PR" || true
          git push "$REPO_URL" gh-pages

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          PREVIEW_URL="https://${OWNER}.github.io/${REPO}/pr-preview/${PR}/"
          COMMENT_BODY="🚀 **PR Preview:** [${PREVIEW_URL}](${PREVIEW_URL})"
          COMMENT_TAG="<!-- pr-preview-comment -->"

          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" --jq ".[] | select(.body | contains(\"${COMMENT_TAG}\")) | .id")

          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" -X DELETE
          fi

          BODY=$(printf '%s\n\n%s' "${COMMENT_TAG}" "🚀 **PR Preview:** [Click here to preview](${PREVIEW_URL})")
          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Remove preview
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git clone --branch gh-pages --single-branch "$REPO_URL" /tmp/gh-pages || exit 0

          cd /tmp/gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          rm -rf pr-preview/$PR
          git add -A
          git commit -m "Remove preview for PR $PR" || true
          git push "$REPO_URL" gh-pages
