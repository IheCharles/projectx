name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci

      - run: npm run build

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd /tmp
          git clone --branch gh-pages --single-branch https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages-repo || {
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages-repo
            cd gh-pages-repo
            git checkout --orphan gh-pages
            git rm -rf .
          }
          cd /tmp/gh-pages-repo

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Remove old root files but keep pr-preview/
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'pr-preview' -exec rm -rf {} +

          cp -r $GITHUB_WORKSPACE/dist/* .

          git add -A
          git commit -m "deploy: ${{ github.sha }}" || true
          git push origin gh-pages
