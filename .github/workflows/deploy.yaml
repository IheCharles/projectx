name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci

      - run: npm run build

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git clone --branch gh-pages --single-branch "$REPO_URL" /tmp/gh-pages || {
            git init /tmp/gh-pages
            git -C /tmp/gh-pages checkout --orphan gh-pages
          }

          cd /tmp/gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'pr-preview' -exec rm -rf {} +
          cp -r $GITHUB_WORKSPACE/dist/* .

          git add -A
          git commit -m "deploy: ${{ github.sha }}" || true
          git push "$REPO_URL" gh-pages
